# 케이스 카탈로그 — POST /rituals/morning/promise
# 명세: docs/API_SPEC.md#4.5 (Rituals — 아침/저녁 의식)
# 상위 명세: docs/verify-feature-spec.md (v0.2)
# 라우팅: docs/verify-cases/_routing-map.yaml ─ endpoints["POST /rituals/morning/promise"]

schema_version: 1
target: endpoint:POST /rituals/morning/promise
spec_section: docs/API_SPEC.md#4.5
phase: p1
feature: rituals

storyboard:
  summary: |
    아침 기분 기록 후 사용자가 오늘의 약속(1~200자 문자열)을 확정한다.
    성공 시 저장된 promise와 saved_at을 반환한다.
    200자를 초과하면 400을 반환한다.
  steps:
    - 사전조건: 아침 기분 기록 완료 (mood 기록 후 약속 확정 가능)
    - 사용자 액션: POST /rituals/morning/promise { promise }
    - 기대 결과: 200 + data.{ promise, saved_at }
  branches:
    - 정상 약속 확정 → 200 + promise + saved_at
    - 200자 초과 → 400 Bad Request (ValidationPipe)

# ──────────────────────────────────────────────────────
# 사전조건
# ──────────────────────────────────────────────────────
setup:
  user: fresh
  preconditions:
    - case_ref: rituals_morning_mood#happy   # 기분 기록 후 약속 확정

# ──────────────────────────────────────────────────────
# 케이스
# ──────────────────────────────────────────────────────
cases:
  # ── Happy: 약속 확정 ──────────────────────────────
  - id: happy
    name: 정상 약속 확정 → 200 + promise + saved_at
    request:
      method: POST
      path: /rituals/morning/promise
      body:
        promise: "오늘 물 8잔 마시기"
      auth: required
    expect:
      status: 200
      body_schema:
        type: object
        required: [promise, saved_at]
        properties:
          promise:  { type: string, const: "오늘 물 8잔 마시기" }
          saved_at: { type: string }   # ISO 8601 datetime
        additionalProperties: false
    capture_fixture: true
    fixture_mask: [saved_at]

  # ── 오류: 200자 초과 ──────────────────────────────
  - id: error_too_long
    name: 250자 약속 → 400 Bad Request
    request:
      method: POST
      path: /rituals/morning/promise
      body:
        # 201자 문자열 (MaxLength 200 초과)
        promise: "가나다라마바사아자차카타파하가나다라마바사아자차카타파하가나다라마바사아자차카타파하가나다라마바사아자차카타파하가나다라마바사아자차카타파하가나다라마바사아자차카타파하가나다라마바사아자차카타파하가나다라마바사아자차카타파하가나다라마바사아자차카타파하가나다라마바사아자차카타파하가나다라마바사아자차카타파하가나다라마바사아자차카타파하가나다라마바사아자차카타파하가나다라마바사아자차카타파하가나다라마"
      auth: required
    expect:
      status: 400
    capture_fixture: false
