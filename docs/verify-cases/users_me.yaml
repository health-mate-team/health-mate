# 케이스 카탈로그 — GET /users/me
# 명세: docs/API_SPEC.md#4.2 (Users — 사용자 프로필)
# 상위 명세: docs/verify-feature-spec.md (v0.2)
# 라우팅: docs/verify-cases/_routing-map.yaml ─ endpoints["GET /users/me"]

schema_version: 1
target: endpoint:GET /users/me
spec_section: docs/API_SPEC.md#4.2
phase: p0
feature: users

storyboard:
  summary: |
    로그인한 사용자가 자신의 프로필 정보를 조회한다.
    JWT 토큰이 있으면 200 + 사용자 정보, 없으면 401을 반환한다.
    온보딩 완료 후에는 is_onboarding_completed가 true로 변경된다.
  steps:
    - 사전조건: 가입 완료 상태 (access_token 보유)
    - 사용자 액션: GET /users/me (Authorization 헤더 포함)
    - 기대 결과: 200 + data.{ id, email, name, is_onboarding_completed, created_at }
  branches:
    - 토큰 있음 → 200 + 사용자 정보 반환
    - 토큰 없음 → 401 Unauthorized

# ──────────────────────────────────────────────────────
# 사전조건
# ──────────────────────────────────────────────────────
setup:
  user: fresh
  preconditions:
    - case_ref: auth_register#happy   # 가입 완료 → access_token 획득

# ──────────────────────────────────────────────────────
# 케이스
# ──────────────────────────────────────────────────────
cases:
  # ── Happy: 토큰 포함 조회 ─────────────────────────
  - id: happy_authed
    name: 토큰 포함 → 200 + 사용자 정보
    request:
      method: GET
      path: /users/me
      auth: required
    expect:
      status: 200
      body_schema:
        type: object
        required: [id, email, name, is_onboarding_completed, created_at]
        properties:
          id:                      { type: string, format: uuid }
          email:                   { type: string, format: email }
          name:                    { type: string, minLength: 1, const: "테스터" }
          is_onboarding_completed: { type: boolean, const: false }
          created_at:              { type: string }
        additionalProperties: false
    capture_fixture: true
    fixture_mask: [id, email, created_at]   # 실행마다 달라지는 값

  # ── 경계: 토큰 없음 ───────────────────────────────
  - id: error_unauth
    name: 토큰 없음 → 401 Unauthorized
    request:
      method: GET
      path: /users/me
      auth: none
    expect:
      status: 401
    capture_fixture: false
