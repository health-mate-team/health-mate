# 케이스 카탈로그 — POST /nutrition/logs + GET /nutrition/today
# 명세: docs/API_SPEC.md#4.10 (Nutrition — 식단)
# 상위 명세: docs/verify-feature-spec.md (v0.2)

schema_version: 1
target: endpoint:POST /nutrition/logs
spec_section: docs/API_SPEC.md#4.10
phase: p3
feature: nutrition

storyboard:
  summary: |
    사용자가 식사를 기록하면 meal_log + meal_log_items가 생성되고
    total_calories + XP +10이 반환된다.
    오늘 식단 조회 시 phase_recommendation + 식사 목록이 반환된다.
  steps:
    - 사전조건: 로그인 완료
    - 식사 기록: POST /nutrition/logs { meal_type, foods }
    - 기대: meal_log_id + total_calories + xp_earned=10
    - 오늘 조회: GET /nutrition/today
    - 기대: total_calories + phase_recommendation + meals[]
  branches:
    - 정상 기록 → 201 + meal_log_id
    - 오늘 조회 → 200 + phase_recommendation
    - 토큰 없음 → 401

setup:
  user: fresh
  preconditions:
    - case_ref: auth_register#happy

cases:
  - id: happy_log
    name: 점심 식사 기록 → 200 + xp_earned=10
    request:
      method: POST
      path: /nutrition/logs
      auth: required
      body:
        meal_type: "lunch"
        foods:
          - food_id: "mfds_001234"
            amount_g: 150
    expect:
      status: 200
      body_schema:
        type: object
        required: [meal_log_id, total_calories, xp_earned]
        properties:
          meal_log_id:    { type: string, minLength: 1 }
          total_calories: { type: integer, minimum: 0 }
          xp_earned:      { type: integer, const: 10 }
        additionalProperties: false
    capture_fixture: true
    fixture_mask: [meal_log_id]

  - id: happy_today
    name: 오늘 식단 조회 → 200 + phase_recommendation
    request:
      method: GET
      path: /nutrition/today
      auth: required
    expect:
      status: 200
      body_schema:
        type: object
        required: [date, total_calories, daily_target_calories, phase_recommendation, meals]
        properties:
          date:                   { type: string }
          total_calories:         { type: integer, minimum: 0 }
          daily_target_calories:  { type: integer, const: 1800 }
          phase_recommendation:
            type: object
            required: [phase, focus_nutrients, message]
            properties:
              phase:           { type: string }
              focus_nutrients: { type: array, items: { type: string } }
              message:         { type: string }
          meals:
            type: array
            items:
              type: object
              required: [meal_type, calories, foods_count]
              properties:
                meal_type:   { type: string }
                calories:    { type: integer }
                foods_count: { type: integer }
        additionalProperties: false
    capture_fixture: true
    fixture_mask: [date]

  - id: error_invalid_meal_type
    name: meal_type 잘못된 값 → 400
    request:
      method: POST
      path: /nutrition/logs
      auth: required
      body:
        meal_type: "brunch"
        foods:
          - food_id: "mfds_001234"
            amount_g: 100
    expect:
      status: 400
    capture_fixture: false

  - id: error_unauth
    name: 토큰 없음 → 401
    request:
      method: POST
      path: /nutrition/logs
      auth: none
      body:
        meal_type: "lunch"
        foods: []
    expect:
      status: 401
    capture_fixture: false
