# 케이스 카탈로그 — GET /cycle/current
# 명세: docs/API_SPEC.md#4.4 (Cycle — 사이클 OS)
# 상위 명세: docs/verify-feature-spec.md (v0.2)
# 라우팅: docs/verify-cases/_routing-map.yaml ─ endpoints["GET /cycle/current"]

schema_version: 1
target: endpoint:GET /cycle/current
spec_section: docs/API_SPEC.md#4.4
phase: p1
feature: cycle

storyboard:
  summary: |
    온보딩 완료 사용자가 현재 생리 주기 단계와 일자를 조회한다.
    last_period_start_date 기준으로 오늘의 day_of_cycle과 current_phase를 계산해 반환한다.
    인증 없으면 401을 반환한다.
  steps:
    - 사전조건: 온보딩 완료 (last_period_start_date 등록됨)
    - 사용자 액션: GET /cycle/current
    - 기대 결과: 200 + data.{ current_phase, day_of_cycle, days_until_next_period, ... }
  branches:
    - 온보딩 완료 사용자 → 200 + 주기 정보 전체
    - 토큰 없음 → 401

# ──────────────────────────────────────────────────────
# 사전조건
# ──────────────────────────────────────────────────────
setup:
  user: fresh
  preconditions:
    - case_ref: onboarding_complete#happy   # 온보딩 완료 → user_cycles 행 생성

# ──────────────────────────────────────────────────────
# 케이스
# ──────────────────────────────────────────────────────
cases:
  # ── Happy: 사이클 현재 상태 조회 ─────────────────
  - id: happy
    name: 온보딩 완료 사용자 → 200 + 주기 정보
    request:
      method: GET
      path: /cycle/current
      auth: required
    expect:
      status: 200
      body_schema:
        type: object
        required:
          - current_phase
          - day_of_cycle
          - days_until_next_period
          - next_period_date
          - average_cycle_length
          - average_period_length
          - is_irregular
          - goal_type
        properties:
          current_phase:
            type: string
            enum: [menstrual, follicular, ovulation, luteal]
          day_of_cycle:
            type: integer
            minimum: 1
          days_until_next_period:
            type: integer
            minimum: 0
          next_period_date:
            type: string   # YYYY-MM-DD
          average_cycle_length:
            type: integer
            const: 28
          average_period_length:
            type: integer
            const: 5
          is_irregular:
            type: boolean
            const: false
          goal_type:
            type: string
            enum: [energy, hydration, rest, fitness]
        additionalProperties: false
    capture_fixture: true
    fixture_mask: [day_of_cycle, days_until_next_period, next_period_date, current_phase]
    # 날짜·단계는 실행 시점에 따라 달라짐

  # ── 경계: 토큰 없음 ───────────────────────────────
  - id: error_unauth
    name: 토큰 없음 → 401 Unauthorized
    request:
      method: GET
      path: /cycle/current
      auth: none
    expect:
      status: 401
    capture_fixture: false
