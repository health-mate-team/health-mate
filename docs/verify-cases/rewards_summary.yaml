# 케이스 카탈로그 — GET /rewards/summary
# 명세: docs/API_SPEC.md#4.8 (Rewards — XP & 레벨 & 배지)
# 상위 명세: docs/verify-feature-spec.md (v0.2)

schema_version: 1
target: endpoint:GET /rewards/summary
spec_section: docs/API_SPEC.md#4.8
phase: p2
feature: rewards

storyboard:
  summary: |
    로그인한 사용자가 레벨·XP·배지·streak·진화 단계 요약을 조회한다.
    신규 사용자는 level=1, current_xp=0, badges=[], xp_log=[]를 반환한다.
    XP가 300 이상이면 level=5로 상승한다.
  steps:
    - 사전조건: 로그인 완료 (access_token 보유)
    - 사용자 액션: GET /rewards/summary
    - 기대 결과: level/current_xp/streak/evolution_stage/badges/xp_log 반환
  branches:
    - 신규 사용자 → level=1, xp=0, badges=[]
    - 토큰 없음 → 401

setup:
  user: fresh
  preconditions:
    - case_ref: auth_register#happy

cases:
  - id: happy_fresh
    name: 신규 사용자 → level=1, xp=0
    request:
      method: GET
      path: /rewards/summary
      auth: required
    expect:
      status: 200
      body_schema:
        type: object
        required: [level, current_xp, xp_to_next_level, total_xp_earned, streak, evolution_stage, badges, xp_log]
        properties:
          level:            { type: integer, minimum: 1 }
          current_xp:       { type: integer, minimum: 0 }
          xp_to_next_level: { type: integer, minimum: 0 }
          total_xp_earned:  { type: integer, minimum: 0 }
          streak:
            type: object
            required: [current, longest]
            properties:
              current: { type: integer, minimum: 0 }
              longest: { type: integer, minimum: 0 }
          evolution_stage:
            type: object
            required: [stage, name, color_token, next_stage_xp_threshold, xp_to_next]
            properties:
              stage:                   { type: integer, minimum: 1 }
              name:                    { type: string }
              color_token:             { type: string }
              next_stage_xp_threshold: { type: integer }
              xp_to_next:              { type: integer }
          badges:  { type: array }
          xp_log:  { type: array }
        additionalProperties: false
    capture_fixture: true
    fixture_mask: []

  - id: error_unauth
    name: 토큰 없음 → 401
    request:
      method: GET
      path: /rewards/summary
      auth: none
    expect:
      status: 401
    capture_fixture: false
