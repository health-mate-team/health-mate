version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '127.0.0.1:5433:5432'
    environment:
      POSTGRES_DB: ${DB_NAME:-health_mate}
      POSTGRES_USER: ${DB_USER:-healthmate}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-healthmate}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend-net
      - ai-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '127.0.0.1:6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3001:3000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-healthmate}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-health_mate}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
    networks:
      - backend-net

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-healthmate}:${DB_PASSWORD}@db:5432/${DB_NAME:-health_mate}
    networks:
      - ai-net

volumes:
  pgdata:

networks:
  backend-net:
  ai-net:
