name: health_mate
description: Personal healthcare (fitness) management app — Before/After tracking with rewards.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # 상태 관리
  flutter_riverpod: ^2.6.1

  # 라우팅
  go_router: ^14.6.2

  # 유틸 (실제 사용 중)
  intl: ^0.20.1
  shared_preferences: ^2.3.3

  # 로컬 DB (Cycle OS / Analytics — bumpist 신규 feature에서 사용)
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # 데이터 클래스 어노테이션 (cycle entities / analytics_event)
  freezed_annotation: ^2.4.4

  # Riverpod 어노테이션 (cycle / survey providers)
  riverpod_annotation: ^2.6.1

  # ──────────────────────────────────────────────────────────────
  # Phase 2 활성화 시 주석 해제 — 현재 lib/ 미사용 (UI 동작 테스트 단계)
  # ──────────────────────────────────────────────────────────────
  # 로컬 DB (오프라인 퍼스트)
  # drift: ^2.21.0
  # sqlite3_flutter_libs: ^0.5.24
  # path_provider: ^2.1.4
  # path: ^1.9.0
  #
  # 네트워킹
  dio: ^5.7.0
  # retrofit: ^4.4.1
  #
  # 차트 (체중/운동 추이)
  # fl_chart: ^0.69.0
  #
  # 건강 데이터 (HealthKit / Health Connect 통합)
  # health: ^13.3.1
  #
  # 인앱 결제 (RevenueCat)
  # purchases_flutter: ^9.16.0
  #
  # 푸시 알림 (재활성화 시 desugaring 설정 필요)
  # firebase_core: ^3.8.1
  # firebase_messaging: ^15.1.4
  # flutter_local_notifications: ^18.0.1
  #
  # 카메라 / 이미지 (Before-After 사진)
  # camera: ^0.11.0+2
  # image_picker: ^1.1.2
  #
  # 백그라운드 동기화 (오프라인 Sync) — 0.9.0+ 사용 필수 (0.5.x는 Flutter v1 embedding으로 미컴파일)
  # workmanager: ^0.9.0+3
  #
  # BLE (InBody, Withings)
  # flutter_blue_plus: ^1.34.5
  #
  # 코드 생성 어노테이션
  # freezed_annotation: ^2.4.4
  # json_annotation: ^4.9.0
  # riverpod_annotation: ^2.6.1
  #
  # 추가 유틸
  # connectivity_plus: ^6.1.1
  flutter_secure_storage: ^9.2.2
  #
  # UI
  # cached_network_image: ^3.4.1
  # shimmer: ^3.0.0

  # 음성 안내 (audio_guide 운동: light_cardio, breathing_meditation)
  flutter_tts: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # 코드 생성 (bumpist freezed entities / drift DAO / riverpod providers)
  build_runner: ^2.4.13
  drift_dev: ^2.21.0
  freezed: ^2.5.7
  riverpod_generator: ^2.6.2
  # json_serializable / retrofit_generator: 현재 미사용 — 필요 시 재도입

flutter:
  uses-material-design: true
  assets:
    - assets/images/mascot/
    - assets/seed/
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
