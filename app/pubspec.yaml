name: health_mate
description: Personal healthcare (fitness) management app — Before/After tracking with rewards.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # 상태 관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 로컬 DB (오프라인 퍼스트)
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # 네트워킹
  dio: ^5.7.0
  retrofit: ^4.4.1

  # 라우팅
  go_router: ^14.6.2

  # 차트 (체중/운동 추이)
  fl_chart: ^0.69.0

  # 건강 데이터 (HealthKit / Health Connect 통합)
  health: ^13.3.1

  # 인앱 결제 (RevenueCat)
  purchases_flutter: ^9.16.0

  # 푸시 알림
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.4
  flutter_local_notifications: ^18.0.1

  # 카메라 / 이미지 (Before-After 사진)
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # 백그라운드 동기화 (오프라인 Sync)
  workmanager: ^0.5.2

  # BLE (InBody, Withings — Phase 2)
  flutter_blue_plus: ^1.34.5

  # 유틸
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  crypto: ^3.0.5
  intl: ^0.20.1
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.1
  flutter_secure_storage: ^9.2.2

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # 음성 안내 (audio_guide 운동: light_cardio, breathing_meditation)
  flutter_tts: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # 코드 생성
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.2
  drift_dev: ^2.21.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  # retrofit_generator: 일시 비활성화 — retrofit 4.9.2 / generator 9.7.0 비호환으로 build script 컴파일 실패.
  # 백엔드 API 연동 시점에 버전 핀 후 재도입.
  # retrofit_generator: ^9.1.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/mascot/
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
